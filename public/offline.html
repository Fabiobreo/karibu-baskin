<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karibu Baskin — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1A1A1A;
      color: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 24px;
      text-align: center;
    }
    img { width: 72px; height: 72px; object-fit: contain; opacity: 0.9; }
    h1 { font-size: 1.5rem; font-weight: 800; color: #E65100; }
    p { font-size: 0.95rem; color: rgba(255,255,255,0.6); max-width: 320px; line-height: 1.6; }
    .icon {
      font-size: 3rem;
      margin-bottom: -8px;
    }
    button {
      margin-top: 8px;
      background: #E65100;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover { background: #BF360C; }
  </style>
</head>
<body>
  <span class="icon">📡</span>
  <img src="/logo.png" alt="Karibu Baskin" />
  <h1>Sei offline</h1>
  <p>Controlla la connessione. Alcune pagine visitate di recente sono comunque disponibili.</p>
  <button onclick="location.reload()">Riprova</button>
  <script>
    window.addEventListener("online", () => location.reload());
  </script>
</body>
</html>
